name: ML-Orchestrated CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  defect-prediction:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run defect prediction
        run: python RF_JSON.py

      - name: Upload predictions artifact
        uses: actions/upload-artifact@v3
        with:
          name: defect_predictions
          path: defect_predictions.json


  orchestration:
    runs-on: windows-latest
    needs: defect-prediction

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Download predictions artifact
        uses: actions/download-artifact@v3
        with:
          name: defect_predictions
          path: .

      - name: Show files (DEBUG STEP)
        run: dir

      - name: Run orchestration layer
        run: python orchestrator.py
